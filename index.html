<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Hello</title>
    <script src="https://cdn.bootcss.com/vue/2.4.2/vue.min.js"></script>
</head>
<body>


    <div id="app">
        <div>
            {{hello}}
        </div>

    </div>




    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            data: {
                hello: "Hello World!!"
            }
        });
    </script>
</body>
</html>
